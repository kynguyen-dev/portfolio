<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/dashboard-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://kynguyen.dev/" />
    <title>Ky Nguyen | Software Developer Portfolio</title>
    <meta
      name="description"
      content="Ky Nguyen – Software Developer specializing in React, TypeScript, Java & Spring Boot. Explore my projects, skills, and experience."
    />
    <meta
      name="keywords"
      content="Ky Nguyen, Software Developer, Frontend Developer, Backend Developer, React, TypeScript, Java, Spring Boot, Portfolio"
    />
    <meta name="author" content="Ky Nguyen" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ky Nguyen Portfolio" />
    <meta property="og:locale" content="en_US" />
    <meta
      property="og:title"
      content="Ky Nguyen | Software Developer Portfolio"
    />
    <meta
      property="og:description"
      content="Explore my projects, skills, and experience as a Software Developer."
    />
    <meta
      property="og:image"
      content="https://kynguyen.dev/images/avatar.png"
    />
    <meta property="og:url" content="https://kynguyen.dev" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Ky Nguyen | Software Developer Portfolio"
    />
    <meta
      name="twitter:description"
      content="Explore my projects, skills, and experience as a Software Developer."
    />
    <meta
      name="twitter:image"
      content="https://kynguyen.dev/images/avatar.png"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0B0D2E" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icons/dashboard-icon.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Ky Nguyen",
        "url": "https://kynguyen.dev",
        "jobTitle": "Software Developer",
        "sameAs": [
          "https://github.com/kynguyen-dev",
          "https://www.linkedin.com/in/kynguyen-dev"
        ]
      }
    </script>

    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
